type: custom:fork-u-house-card
layout_options:
  grid_columns: 4    # wider card in sections view (default: 2)
  grid_rows: auto    # auto height
# performance: auto  # "auto" (default) detects slow devices and disables blur
                     # "low" forces low-perf mode (no backdrop blur)
                     # "high" forces full effects even on slow devices
language: pl
image_path: /local/house-images/
image: /local/community/fork_u-house_card/images/
weather_entity: weather.forecast_home
season_entity: sensor.season
sun_entity: sun.sun
cloud_coverage_entity: sensor.home_cloud_coverage
party_mode_entity: input_boolean.gaming_mode
gaming_image: synthwave  # Options: synthwave, cyberpunk, matrix, mario, xbox_kid
aqi_entity: beresfield_lower_hunter_pm2_5
pollen_entity: sensor.home_pollen_types_32_753374151_625700_grass
uv_entity: sensor.home_uv_index
wind_speed_entity: sensor.home_wind_speed
wind_direction_entity: sensor.home_wind_direction

# Global temperature thresholds: [cold, optimal, warm, hot]
# Default: [18, 24, 30, 35]
# temp_thresholds: [16, 22, 30, 38]

# ---- Smart Tips ----
# Replaces the static AI footer with contextual, actionable tips.
# Each rule uses Jinja2 templates (same syntax as HA automations).
# All rules are batched into ONE websocket subscription — HA does the work.
#
# Options:
#   display:           "rotating" (default), "single", or "stacked"
#   rotation_seconds:  seconds between tips in rotating mode (default: 8)
#   hide_when_empty:   hide footer when no tips active (default: true)
#   idle_message:      string to show when no tips active (overrides hide_when_empty)
#
# Each rule:
#   id:        unique identifier
#   icon:      mdi:icon-name or emoji
#   text:      message (can include {{...}} for inline values)
#   level:     info, warn, or danger (drives footer colour)
#   priority:  number — higher wins when multiple tips fire
#   when:      Jinja2 template returning true/false
tips:
  display: rotating
  rotation_seconds: 8
  hide_when_empty: true
  idle_message: "😎 All clear — great time for a walk or airing out the house"

  rules:
    - id: bin_night
      icon: "mdi:trash-can"
      text: "Bin night — put the bins out before bed"
      level: info
      priority: 5
      when: >-
        {{ now().hour >= 17 and now().weekday() == 1 }}

    - id: rain_soon
      icon: "mdi:weather-pouring"
      level: warn
      priority: 8
      text: "Rain expected soon — bring washing in"
      when: >-
        {{ (state_attr('weather.forecast_home','forecast') or [])[:3]
           | selectattr('condition','in',['rainy','pouring'])
           | list | count > 0 }}

    - id: uv_high
      icon: "mdi:weather-sunny-alert"
      level: warn
      priority: 6
      text: "UV index {{ states('sensor.home_uv_index') }} — slip slop slap"
      when: >-
        {{ states('sensor.home_uv_index') | float(0) > 7
           and is_state('sun.sun','above_horizon') }}

    - id: storm_warning
      icon: "mdi:weather-lightning"
      level: danger
      priority: 10
      text: "Storm warning! Lightning detected nearby"
      when: >-
        {{ is_state('weather.forecast_home','lightning')
           or is_state('weather.forecast_home','lightning-rainy') }}

    - id: solar_peak
      icon: "mdi:solar-power"
      level: info
      priority: 4
      text: "Solar producing {{ (states('sensor.solar_power') | float / 1000) | round(1) }} kW — good time to run dishwasher"
      when: >-
        {{ states('sensor.solar_power') | float(0) > 5000 }}

    - id: pool_motion
      icon: "mdi:pool"
      level: warn
      priority: 9
      text: "Motion in pool area — keep an eye on the kids"
      when: >-
        {{ is_state('binary_sensor.pool_external_g4_dome_motion','Detected') }}

    # ---- AI Narrative tips (mirrors the original AI advisor messages) ----
    # These reproduce the previous static AI advisor as low-priority tips.
    # Higher-priority rules above will override them when relevant.

    # 1. DANGER / STORM (highest of the AI narratives)
    - id: ai_storm
      icon: "⚠️"
      level: danger
      priority: 100
      text: "CRITICAL ALERT: A storm with lightning is active nearby. Strong winds and heavy rain are expected. Please secure loose objects outside and stay indoors for safety."
      when: >-
        {{ states('weather.forecast_home') in ['lightning','lightning-rainy','hail'] }}

    # 2. HEALTH: AQI bad
    - id: ai_aqi_bad
      icon: "😷"
      level: danger
      priority: 95
      text: "SMOG ALERT: Air quality is critical (PM2.5: {{ states('sensor.beresfield_lower_hunter_pm2_5') }}). Prolonged exposure is dangerous. Keep windows closed and run your air purifier."
      when: >-
        {{ states('sensor.beresfield_lower_hunter_pm2_5') | float(0) > 100 }}

    # 2b. HEALTH: AQI moderate
    - id: ai_aqi_mod
      icon: "😶"
      level: warn
      priority: 90
      text: "AIR QUALITY WARNING: PM2.5 levels are elevated ({{ states('sensor.beresfield_lower_hunter_pm2_5') }}). Sensitive groups should limit outdoor exertion today."
      when: >-
        {{ 50 < states('sensor.beresfield_lower_hunter_pm2_5') | float(0) <= 100 }}

    # 3. HEALTH: Pollen
    - id: ai_pollen
      icon: "🤧"
      level: warn
      priority: 85
      text: "ALLERGY ALERT: High pollen concentration detected. If you suffer from allergies, keep windows shut and have your medication ready."
      when: >-
        {{ states('sensor.home_pollen_types_32_753374151_625700_grass') in ['high','very_high','extreme','red']
           or states('sensor.home_pollen_types_32_753374151_625700_grass') | float(0) > 50 }}

    # 4. FORECAST: Rain coming in next 3h
    - id: ai_rain_soon
      icon: "☂️"
      level: warn
      priority: 80
      text: "PLAN AHEAD: Rain is approaching. Don't leave without an umbrella."
      when: >-
        {{ (state_attr('weather.forecast_home','forecast') or [])[:3]
           | selectattr('condition','in',['rainy','pouring'])
           | list | count > 0
           and states('weather.forecast_home') not in ['rainy','pouring','snowy','snowy-rainy'] }}

    # 4b. FORECAST: Snow coming in next 3h
    - id: ai_snow_soon
      icon: "❄️"
      level: warn
      priority: 80
      text: "WINTER ALERT: Snow expected soon. Road conditions may deteriorate. Drive with caution."
      when: >-
        {{ (state_attr('weather.forecast_home','forecast') or [])[:3]
           | selectattr('condition','equalto','snowy')
           | list | count > 0
           and not is_state('weather.forecast_home','snowy') }}

    # 5. CURRENT: Raining now
    - id: ai_rain_now
      icon: "🌧️"
      level: warn
      priority: 70
      text: "CURRENTLY RAINING: Wet surfaces and reduced visibility. Drive safely and wear waterproof gear."
      when: >-
        {{ states('weather.forecast_home') in ['rainy','pouring'] }}

    # 5b. CURRENT: Snowing now
    - id: ai_snow_now
      icon: "🌨️"
      level: warn
      priority: 70
      text: "SNOWING: Snow is falling right now. Enjoy the view, but dress warmly if you head out."
      when: >-
        {{ states('weather.forecast_home') in ['snowy','snowy-rainy'] }}

    # 6. UV high
    - id: ai_uv
      icon: "☀️"
      level: warn
      priority: 60
      text: >-
        HIGH UV RADIATION: The UV Index is {{ states('sensor.home_uv_index') }}.
        Unprotected skin can burn quickly. Use sunscreen and wear sunglasses if you go out.
      when: >-
        {{ states('sensor.home_uv_index') | float(0) > 6 }}

    # 7. TEMPERATURE: cold + windy (wind chill)
    - id: ai_cold_wind
      icon: "🥶"
      level: info
      priority: 50
      text: >-
        WIND CHILL WARNING: It's {{ state_attr('weather.forecast_home','temperature') | default('--') }}°C,
        but the strong wind makes it feel much colder. Wear windproof layers and a hat.
      when: >-
        {{ state_attr('weather.forecast_home','temperature') | float(99) < 10
           and states('sensor.home_wind_speed') | float(0) > 20 }}

    # 7b. TEMPERATURE: cold
    - id: ai_cold
      icon: "🧣"
      level: info
      priority: 45
      text: >-
        COLD WEATHER: Outside temperature is {{ state_attr('weather.forecast_home','temperature') | default('--') }}°C.
        It's chilly — make sure to zip up your jacket and keep warm.
      when: >-
        {{ state_attr('weather.forecast_home','temperature') | float(99) < 5 }}

    # 7c. TEMPERATURE: hot
    - id: ai_hot
      icon: "🔥"
      level: warn
      priority: 55
      text: >-
        HEAT ADVISORY: Temperatures have reached {{ state_attr('weather.forecast_home','temperature') | default('--') }}°C.
        Avoid strenuous activity in direct sunlight and drink plenty of water.
      when: >-
        {{ state_attr('weather.forecast_home','temperature') | float(0) > 28 }}

    # 8. STABLE / NICE — moved to idle_message in the tips: config above.
    # Don't use an always-true rule here — it causes HA template evaluation
    # issues. Use idle_message instead for the "nothing to report" case.

    # 9. GAMING MODE (overrides nice when active)
    - id: ai_gaming
      icon: "🎮"
      level: info
      priority: 3
      text: "GAMING MODE: Immersive lighting active. Notifications silenced."
      when: >-
        {{ is_state('input_boolean.gaming_mode','on') }}

    # ---- Home-specific tips (tuned to this household's actual sensors) ----
    # These rules cover indoor air quality, garage state, the shed homebrew
    # setup, solar hardware temps, the sprinkler network, and the Tesla.
    # Priority bands: 10 = danger, 6-8 = warn, 1-5 = info. They deliberately
    # coexist with the AI Narrative block above — overlaps are OK, the
    # highest-priority firing rule wins.

    # Indoor CO2 danger (> 1500 ppm = uncomfortable, think fresh)
    - id: co2_danger
      level: danger
      priority: 10
      icon: mdi:molecule-co2
      when: >-
        {{ states('sensor.indoor_carbon_dioxide') | int(0) > 1500 }}
      text: "CO₂ at {{ states('sensor.indoor_carbon_dioxide') }} ppm — open a window"

    # Indoor CO2 high (1000-1500 = drowsy zone)
    - id: co2_high
      level: warn
      priority: 8
      icon: mdi:window-open-variant
      when: >-
        {{ 1000 < states('sensor.indoor_carbon_dioxide') | int(0) <= 1500 }}
      text: "CO₂ {{ states('sensor.indoor_carbon_dioxide') }} ppm — fresh air would help"

    # Garage left open after dark — higher urgency at night
    - id: garage_open_night
      level: danger
      priority: 9
      icon: mdi:garage-open-variant
      when: >-
        {{ is_state('cover.aeon_labs_garage_door_controller_gen5','open')
           and is_state('sun.sun','below_horizon') }}
      text: "Garage door open after dark"

    # Garage open during the day — just a gentle nag
    - id: garage_open_day
      level: warn
      priority: 7
      icon: mdi:garage-alert-variant
      when: >-
        {{ is_state('cover.aeon_labs_garage_door_controller_gen5','open')
           and is_state('sun.sun','above_horizon') }}
      text: "Garage is open"

    # Outdoor AQI poor (complementary to ai_aqi_mod which uses Beresfield PM2.5)
    - id: aqi_poor
      level: warn
      priority: 7
      icon: mdi:weather-hazy
      when: >-
        {{ states('sensor.home_aqi_au_aqi') | int(0) > 100 }}
      text: "Air quality poor (AQI {{ states('sensor.home_aqi_au_aqi') }})"

    # PM2.5 elevated (WHO 24-hour guideline is 15 μg/m³, 25 = caution)
    - id: pm25_elevated
      level: warn
      priority: 6
      icon: mdi:smog
      when: >-
        {{ states('sensor.home_pm2_5') | float(0) > 25 }}
      text: "PM2.5 elevated at {{ states('sensor.home_pm2_5') | round(0) }} μg/m³"

    # Fermenter running hot — any vessel above 24°C
    - id: fermenter_hot
      level: warn
      priority: 7
      icon: mdi:thermometer-alert
      when: >-
        {{ states('sensor.rapt_pill_ff46_temperature') | float(0) > 24
           or states('sensor.fermenter_temp_1_temperature') | float(0) > 24
           or states('sensor.hydro_pill_alpha_temperature') | float(0) > 24 }}
      text: "Fermenter running hot — check the brew"

    # Fermenter running cold (yeast stall risk). float(99) default prevents
    # firing when sensors are offline (they'd all read "unknown" = 99).
    - id: fermenter_cold
      level: warn
      priority: 7
      icon: mdi:snowflake-alert
      when: >-
        {{ states('sensor.rapt_pill_ff46_temperature') | float(99) < 16
           or states('sensor.fermenter_temp_1_temperature') | float(99) < 16
           or states('sensor.hydro_pill_alpha_temperature') | float(99) < 16 }}
      text: "Fermenter running cold — yeast will stall"

    # Solar battery hot — above 45°C starts degrading lifetime
    - id: battery_hot
      level: warn
      priority: 6
      icon: mdi:battery-alert
      when: >-
        {{ states('sensor.solplanet_battery_battery_temperature') | float(0) > 45 }}
      text: "Solar battery at {{ states('sensor.solplanet_battery_battery_temperature') }}°C — hot"

    # Solar inverter hot
    - id: inverter_hot
      level: warn
      priority: 6
      icon: mdi:current-dc
      when: >-
        {{ states('sensor.solplanet_inverter_temperature') | float(0) > 60 }}
      text: "Inverter at {{ states('sensor.solplanet_inverter_temperature') }}°C"

    # Indoor humidity sticky (> 70%)
    - id: indoor_humid
      level: info
      priority: 5
      icon: mdi:water-percent
      when: >-
        {{ states('sensor.indoor_humidity') | int(0) > 70 }}
      text: "Indoor humidity {{ states('sensor.indoor_humidity') }}% — a bit sticky"

    # Any sprinkler zone currently watering (binary_sensor = water flowing)
    - id: sprinklers_running
      level: info
      priority: 4
      icon: mdi:sprinkler-variant
      when: >-
        {{ is_state('binary_sensor.back_boundary_turf_watering','on')
           or is_state('binary_sensor.back_turf_near_wall_watering','on')
           or is_state('binary_sensor.back_turf_near_house_watering','on')
           or is_state('binary_sensor.front_garden_watering','on')
           or is_state('binary_sensor.lhs_front_centre_watering','on')
           or is_state('binary_sensor.lhs_front_near_house_watering','on')
           or is_state('binary_sensor.lhs_front_turf_watering','on')
           or is_state('binary_sensor.lhs_back_turf_and_garden_watering','on')
           or is_state('binary_sensor.rhs_front_turf_watering','on')
           or is_state('binary_sensor.rhs_back_turf_watering','on') }}
      text: "Sprinklers active"

    # House holding heat (indoor significantly warmer than outdoor)
    - id: house_holding_heat
      level: info
      priority: 3
      icon: mdi:home-thermometer
      when: >-
        {{ (states('sensor.indoor_temperature') | float(0))
           - (states('sensor.home_temperature') | float(0)) > 8 }}
      text: "House {{ ((states('sensor.indoor_temperature') | float(0)) - (states('sensor.home_temperature') | float(0))) | round(1) }}°C warmer than outside"

    # House losing heat (outdoor significantly warmer — open up?)
    - id: house_losing_heat
      level: info
      priority: 3
      icon: mdi:snowflake-melt
      when: >-
        {{ (states('sensor.home_temperature') | float(0))
           - (states('sensor.indoor_temperature') | float(0)) > 8 }}
      text: "Outside {{ ((states('sensor.home_temperature') | float(0)) - (states('sensor.indoor_temperature') | float(0))) | round(1) }}°C warmer than inside — open up?"

    # Wind chill noticeable (apparent temperature 3°C+ colder than actual)
    - id: apparent_much_colder
      level: info
      priority: 2
      icon: mdi:weather-windy
      when: >-
        {{ (states('sensor.home_temperature') | float(0))
           - (states('sensor.home_apparent_temperature') | float(0)) > 3 }}
      text: "Feels {{ ((states('sensor.home_temperature') | float(0)) - (states('sensor.home_apparent_temperature') | float(0))) | round(1) }}°C colder than it is — wind chill"

# Birthdays (MM-DD format). During xmas (Dec 1-26), the advent image takes
# priority — Dec 23's advent image already includes girl_bday in the scene.
birthdays:
  - name: boy_bday
    date: "03-15"
  - name: girl_bday
    date: "12-23"

# Weather image overrides (set to true to enable weather-specific images)
# img_winter_snowy_day: true
# img_summer_rainy_night: true

# ---- Colour Reference (hex codes for thresholds/colors) ----
# Reds:       #F87171 (soft red)     #EF4444 (red)          #DC2626 (dark red)      #B91C1C (deep red)
# Oranges:    #FB923C (orange)       #F97316 (bold orange)  #EA580C (burnt orange)
# Ambers:     #FBBF24 (amber)        #F59E0B (gold)         #D97706 (dark gold)
# Yellows:    #FDE047 (yellow)       #FACC15 (sunflower)    #EAB308 (mustard)
# Limes:      #A3E635 (lime)         #84CC16 (lime green)   #65A30D (olive)
# Greens:     #34D399 (emerald)      #10B981 (green)        #059669 (dark green)     #4ADE80 (light green)
# Teals:      #2DD4BF (teal)         #14B8A6 (dark teal)    #0D9488 (deep teal)
# Cyans:      #22D3EE (cyan)         #06B6D4 (sky cyan)     #0891B2 (dark cyan)
# Blues:      #60A5FA (soft blue)    #3B82F6 (blue)         #2563EB (bold blue)      #38BDF8 (sky blue)
# Indigos:    #818CF8 (indigo)       #6366F1 (bold indigo)  #4F46E5 (dark indigo)
# Purples:    #A78BFA (purple)       #8B5CF6 (violet)       #7C3AED (dark violet)
# Pinks:      #F472B6 (pink)         #EC4899 (hot pink)     #DB2777 (magenta)
# Neutrals:   #888888 (grey)         #A1A1AA (light grey)   #52525B (dark grey)      #FFFFFF (white)

rooms:
  # Basic temperature sensor (default unit: °, uses temp colour thresholds)
  - name: Lounge
    entity: sensor.lounge_temp
    "x": 40
    "y": 45
    weight: 1

  # Custom unit with custom colour thresholds
  - name: Humidity
    entity: sensor.lounge_humidity
    unit: "%"
    "x": 60
    "y": 45
    weight: 0  # excluded from median temp
    thresholds: [30, 50, 70]
    colors: ["#F87171", "#34D399", "#FBBF24", "#F87171"]
    # <30% red (dry), 30-50% green (good), 50-70% amber, >70% red (humid)

  # Fermenter with tight brewing range
  - name: Fermenter 1
    entity: sensor.fermenter_temp_1_temperature
    "x": 50
    "y": 50
    weight: 1
    thresholds: [16, 20, 24]
    colors: ["#60A5FA", "#34D399", "#FBBF24", "#F87171"]
    # <16° blue (cold), 16-20° green (ideal), 20-24° amber, >24° red (too hot)

  # Power sensor with custom unit, no colour coding
  - name: Solar
    entity: sensor.solar_power
    unit: "W"
    "x": 70
    "y": 50
    weight: 0

  # ---- show_when visibility examples ----
  # show_when controls when a badge is visible. Omit for always-visible.
  # Works on rooms, alerts, and sprinklers.
  #
  # Exact match (string or number):
  #   show_when: "on"
  #   show_when: 42
  #
  # Array of values (match any):
  #   show_when: ["on", "running", "active"]
  #
  # Comparison operators (for numeric values):
  #   show_when: { gt: 10 }           # greater than 10
  #   show_when: { lt: 50 }           # less than 50
  #   show_when: { gte: 10 }          # greater than or equal to 10
  #   show_when: { lte: 50 }          # less than or equal to 50
  #   show_when: { eq: 42 }           # equals 42
  #   show_when: { neq: 0 }           # not equal to 0
  #   show_when: { range: [10, 50] }  # between 10 and 50 (inclusive)
  #
  # Combine operators (all must be true):
  #   show_when: { gt: 0, lt: 100 }   # between 0 and 100 (exclusive)

  # Only show solar when generating power
  - name: Solar
    entity: sensor.solar_power
    unit: "W"
    show_when: { gt: 0 }
    "x": 70
    "y": 50
    weight: 0

  # Only show pool temp when heater is running (using a different entity)
  # Note: show_when checks the room's own entity value
  - name: Pool
    entity: sensor.pool_temperature
    show_when: { range: [20, 35] }
    "x": 80
    "y": 70
    weight: 0

# ---- Icon Reference ----
# Icons can be emoji (copy-paste) OR Home Assistant mdi: icons (type the name).
#
# HA Material Design Icons (mdi:) — use format: "mdi:icon-name"
#   Motion:     mdi:motion-sensor, mdi:eye, mdi:cctv, mdi:run-fast
#   Doors:      mdi:door, mdi:door-open, mdi:door-closed, mdi:doorbell
#   Garage:     mdi:garage, mdi:garage-open, mdi:garage-alert
#   Locks:      mdi:lock, mdi:lock-open, mdi:lock-alert
#   Lights:     mdi:lightbulb, mdi:lightbulb-off, mdi:lamp, mdi:ceiling-light
#   Switches:   mdi:toggle-switch, mdi:power-plug, mdi:power
#   Climate:    mdi:thermometer, mdi:water-percent, mdi:fan, mdi:air-conditioner
#   Water:      mdi:water, mdi:pool, mdi:water-pump, mdi:waves
#   Security:   mdi:shield-home, mdi:alarm-light, mdi:bell-ring, mdi:siren
#   Cameras:    mdi:camera, mdi:webcam, mdi:video
#   Vehicles:   mdi:car, mdi:car-connected, mdi:ev-station
#   Energy:     mdi:solar-power, mdi:battery, mdi:lightning-bolt, mdi:flash
#   Alerts:     mdi:alert, mdi:alert-circle, mdi:exclamation-thick
#   General:    mdi:check-circle, mdi:information, mdi:home, mdi:fire
#   Browse all: https://pictogrammers.com/library/mdi/
#
# Emoji (copy-paste these directly):
#   Eyes:    👁  👀         Motion:  🏃  💨         Doors:   🚪  🔑
#   Warning: ⚠  ❗  🚨     Camera:  📷  📹         Locks:   🔒  🔓
#   Water:   💧  🏊  🌊    Fire:    🔥  🧯         Power:   ⚡  🔌  💡
#   Temp:    🌡  ❄  🔥     Vehicle: 🚗  🅿         Alarm:   🚨  🔔  📢
#   Weather: ☀  🌧  🌩    Nature:  🌿  🌱  🌳    General: ✅  ❌  ℹ

# ---- Alert Badges ----
# Conditional badges that appear/disappear based on entity state.
# Options:
#   entity:     (required) HA entity to watch
#   show_when:  state value to show badge (default: "on"). Can be a string or list of states.
#   icon:       emoji or "mdi:icon-name" shown in the circle (default: "!")
#   icon_color: hex colour for the icon itself (default: #fff with bg, #ccc without)
#   label:      optional text label next to the icon
#   color:      hex colour of the background circle + glow (omit for no background)
#   x, y:       position as % (0-100)
#   pulse:      true/false — pulsing animation (default: true)
alerts:
  # Camera motion detection (using mdi icon)
  - entity: binary_sensor.pool_external_g4_dome_motion_detection
    icon: "mdi:motion-sensor"
    label: "Motion"
    color: "#F87171"
    "x": 80
    "y": 20

  # Front door camera (using mdi icon)
  - entity: binary_sensor.front_door_cam_motion
    icon: "mdi:door"
    label: "Door"
    color: "#FB923C"
    "x": 30
    "y": 35

  # Pool pump running — no background, just a floating icon
  - entity: switch.pool_pump
    icon: "🏊"
    "x": 75
    "y": 70

  # Sprinklers — mdi icon, no background, custom icon colour
  - entity: switch.garden_sprinklers
    icon: "mdi:sprinkler"
    icon_color: "#38BDF8"
    "x": 85
    "y": 60

  # EV charging — mdi icon, no background, coloured icon
  - entity: sensor.barry_charging
    show_when: ["charging", "no_power"]
    icon: "mdi:lightning-bolt"
    icon_color: "#FBBF24"
    "x": 35
    "y": 45

  # Garage open (mdi icon with colour + label)
  - entity: cover.garage_door
    show_when: "open"
    icon: "mdi:garage-open"
    label: "Garage"
    color: "#FBBF24"
    "x": 45
    "y": 80

  # Alarm triggered — show for multiple states (using mdi icon)
  - entity: alarm_control_panel.home_alarm
    show_when: ["triggered", "pending"]
    icon: "mdi:alarm-light"
    label: "ALARM"
    color: "#DC2626"
    "x": 50
    "y": 10

# ---- Sprinkler Zones ----
# Shows animated rotating sprinkler with expanding water rings when entity is "on".
# Options:
#   entity:  (required) switch/binary_sensor entity for the zone
#   label:   optional zone name
#   color:   water colour (default: #38BDF8 sky blue)
#   size:    small, medium (default), or large
#   x, y:    position as % (0-100)
sprinklers:
  - entity: switch.sprinkler_front_lawn
    label: "Front"
    "x": 30
    "y": 75

  - entity: switch.sprinkler_back_garden
    label: "Back"
    color: "#34D399"
    size: large
    "x": 70
    "y": 30

  - entity: switch.sprinkler_side_strip
    size: small
    "x": 10
    "y": 50

# ---- Bin Night ----
# Shows coloured bin icons on collection day (and from 5pm the night before).
# Options:
#   day:          collection day of the week (monday, tuesday, etc.)
#   cadence:      weekly (default), fortnightly, or monthly
#   anchor_date:  a known collection date (YYYY-MM-DD) to calculate fortnightly/monthly from
#   color:        bin lid colour (match your council bins!)
#   label:        optional label (e.g. "General", "Recycle", "Green")
#   x, y:         position as % (0-100) — position each bin along the curb
#
# How anchor_date works:
#   Set it to any date your bin WAS collected. The card counts weeks from that
#   date to work out if this week is a collection week.
#   For fortnightly: shows every 2 weeks from the anchor.
#   For monthly: shows on the same week-of-month occurrence as the anchor
#                (e.g. anchor on 2nd Tuesday = shows every 2nd Tuesday).
bins:
  # Red lid — general waste (weekly, no anchor needed)
  - day: tuesday
    cadence: weekly
    color: "#DC2626"
    label: "General"
    "x": 12
    "y": 88

  # Yellow lid — recycling (fortnightly)
  - day: tuesday
    cadence: fortnightly
    anchor_date: "2026-04-07"   # a known recycling collection date
    color: "#FBBF24"
    label: "Recycle"
    "x": 18
    "y": 88

  # Green lid — green waste (fortnightly, alternates with recycling)
  - day: tuesday
    cadence: fortnightly
    anchor_date: "2026-04-14"   # the OTHER week from recycling
    color: "#10B981"
    label: "Green"
    "x": 24
    "y": 88

# ---- Energy Flow ----
# Power flow overlay with animated dots between nodes (like HA Energy Dashboard).
# Nodes connect to a central "home" node. Dots flow in the configured direction.
#
# Auto-discovery modes (pulls from HA Energy Dashboard config):
#   auto: true             — auto-discover BOTH sources AND consumers
#   auto_sources: true     — auto-discover sources only (solar/grid/battery)
#   auto_consumers: true   — auto-discover device consumers only
#   (none)                 — fully manual, define everything in nodes:
#
# auto_sources/auto_consumers override auto when set explicitly. e.g.:
#   auto: true + auto_consumers: false = sources only
#
# Both modes can be combined: manual nodes always take priority, auto fills gaps.
# Uses power sensors (stat_rate) where configured, falls back to energy sensors.
#
# energy.home:  Central home node (required)
#   entity:          total home consumption sensor (optional — auto-calculated from sources if omitted)
#   icon:            mdi icon or emoji
#   color:           node border/glow colour
#   unit:            display unit (default: kW)
#   x, y:            position as %
#
# energy.update_interval:  seconds between updates (default: 30)
#
# energy.node_positions:  Override positions for auto-discovered source types
#   solar:    { x, y, icon, color, name, max }
#   grid:     { x, y, icon, color, name, max }
#   battery:  { x, y, icon, color, name, max }
#
# energy.consumer_positions:  Override positions for auto-discovered consumers (by entity ID)
#   sensor.ac_energy: { x, y, name, icon, color, max }
#
# energy.nodes: Array of manually defined source/consumer nodes
#   entity:     power sensor
#   name:       display label
#   icon:       mdi icon or emoji
#   color:      node/line/dot colour
#   direction:  "source" (flows TO home) or "consumer" (flows FROM home)
#   max:        max expected value for scaling dot count/speed (default: 10)
#   unit:       display unit (default: kW)
#   size:       circle diameter in px (default: 44 for sources, 30 for consumers)
#   curvature:  line curve amount, 0=straight (default: 0.15)
#   hide_zero:  set to false to hide node entirely when 0 (default: show dimmed)
#   show_when:  visibility rule (same syntax as badges)
#   x, y:       position as %

# --- Example 1: AUTO sources only (recommended) ---
# Auto-discover solar/grid/battery, add consumers manually
# energy:
#   auto_sources: true
#   home:
#     entity: sensor.home_consumption
#     icon: "mdi:home"
#     color: "#A78BFA"
#     "x": 48
#     "y": 40
#   node_positions:
#     solar: { x: 57, "y": 12 }
#     grid: { x: 88, "y": 55 }
#     battery: { x: 15, "y": 30, battery_entity: "sensor.battery_soc" }
#   nodes:
#     # Manual consumers — only the ones you care about
#     - name: A/C
#       entity: sensor.ac_power
#       icon: "mdi:air-conditioner"
#       color: "#FB923C"
#       direction: consumer
#       max: 5
#       size: 30
#       "x": 32
#       "y": 58
#     - name: EV
#       entity: sensor.ev_charger_power
#       icon: "mdi:ev-station"
#       color: "#F87171"
#       direction: consumer
#       max: 7
#       size: 30
#       "x": 18
#       "y": 72

# --- Example 2: Full AUTO (sources + consumers from HA Energy Dashboard) ---
# energy:
#   auto: true
#   home:
#     entity: sensor.home_consumption
#     "x": 48
#     "y": 40
#   node_positions:
#     solar: { x: 57, "y": 12 }
#     grid: { x: 88, "y": 55 }
#     battery: { x: 15, "y": 30, battery_entity: "sensor.battery_soc" }
#   consumer_positions:
#     sensor.ac_energy: { x: 32, "y": 58, name: "A/C", icon: "mdi:air-conditioner" }
#     sensor.ev_charger_energy: { x: 18, "y": 72, name: "EV", icon: "mdi:ev-station" }

# --- Example 3: Fully manual (no auto-discovery) ---
energy:
  home:
    entity: sensor.home_consumption
    icon: "mdi:home"
    name: "Home"
    color: "#A78BFA"
    unit: "kW"
    "x": 48
    "y": 40

  nodes:
    # --- Sources ---
    - name: Solar
      entity: sensor.solar_power
      icon: "mdi:solar-power"
      color: "#FBBF24"
      direction: source
      max: 10
      "x": 57
      "y": 12

    - name: Battery
      entity: sensor.battery_power
      icon: "mdi:battery"
      color: "#34D399"
      direction: source
      max: 5
      battery_entity: sensor.battery_soc  # SOC sensor — auto-shows fill level icon + percentage
      "x": 15
      "y": 30

    - name: Grid
      entity: sensor.grid_import
      icon: "mdi:transmission-tower"
      color: "#60A5FA"
      direction: source
      max: 8
      "x": 88
      "y": 55

    # --- Consumers ---
    - name: A/C
      entity: sensor.ac_power
      icon: "mdi:air-conditioner"
      color: "#FB923C"
      direction: consumer
      max: 5
      size: 30
      "x": 32
      "y": 58

    - name: EV
      entity: sensor.ev_charger_power
      icon: "mdi:ev-station"
      color: "#F87171"
      direction: consumer
      max: 7
      size: 30
      "x": 18
      "y": 72

    - name: Pool
      entity: sensor.pool_pump_power
      icon: "mdi:pool"
      color: "#38BDF8"
      direction: consumer
      max: 1.5
      size: 30
      "x": 72
      "y": 70

